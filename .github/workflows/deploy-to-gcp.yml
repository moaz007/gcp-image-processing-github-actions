name: Deploy to GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Install dependencies
      - name: Install dependencies
        run: npm install --only=production

      # Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      # Set up Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: bamboo-medium-448219-i3
          install_components: alpha,beta,kubectl

      # Ensure the Artifact Registry exists
      - name: Ensure Artifact Registry exists
        run: |
          REPO_NAME="gcf-artifacts"
          REGION="us-central1"
          gcloud artifacts repositories describe $REPO_NAME --location=$REGION || \
          gcloud artifacts repositories create $REPO_NAME \
            --repository-format=docker \
            --location=$REGION \
            --description="Repository for Cloud Function artifacts"

      # Wait for Active Operations to Complete
      - name: Wait for Active Operations
        run: |
          ACTIVE_OPS=$(gcloud functions operations list \
            --region=us-central1 \
            --filter="done:false" \
            --format="value(name)")
          if [ -n "$ACTIVE_OPS" ]; then
            echo "Active operation detected. Waiting for it to complete..."
            while [ -n "$ACTIVE_OPS" ]; do
              sleep 30
              ACTIVE_OPS=$(gcloud functions operations list \
                --region=us-central1 \
                --filter="done:false" \
                --format="value(name)")
            done
          fi

      # Deploy to Cloud Functions
      - name: Deploy to Cloud Functions
        run: |
          gcloud functions deploy image-resizer \
            --gen2 \
            --runtime=nodejs18 \
            --region=us-central1 \
            --trigger-event=google.storage.object.finalize \
            --trigger-resource=upload-bucket-experiment \
            --entry-point=image-resizer \
            --set-env-vars=PROCESSED_BUCKET=processed-bucket-experiment \
            --source=. \
            --docker-repository=us-central1-docker.pkg.dev/bamboo-medium-448219-i3/gcf-artifacts

